<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live - CreativeFuel</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-top-row">
                <a href="/live.html" class="header-logo-link">
                    <img src="/images/screenshot-removebg.png" alt="CreativeFuel" class="header-logo">
                </a>
                <span id="userNameDisplay" class="header-username"></span>
                <button id="logoutBtn" class="btn btn-small btn-secondary">Logout</button>
            </div>
            <nav class="tabs-container">
                <div class="tabs">
                    <!-- Tabs will be dynamically rendered by nav.js -->
                </div>
            </nav>
        </header>

        <main class="main-content">
            <section class="section section-shoots">

                <!-- Day selector -->
                <div class="day-tabs-wrapper">
                    <div class="day-tabs">
                        <button class="day-tab-btn active" data-tab="today">Today</button>
                        <button class="day-tab-btn" data-tab="tomorrow">Tomorrow</button>
                        <button class="day-tab-btn" data-tab="dayafter">Day After</button>
                    </div>
                </div>

                <!-- Search bar (shared, works on active tab) -->
                <div class="schedule-header">
                    <div class="search-bar-wrapper">
                        <div class="search-input-group">
                            <input type="text" id="scheduleSearch" class="search-input" placeholder="Search by name…" autocomplete="off">
                            <button id="searchClearBtn" class="search-clear-btn" title="Clear search" style="display:none">✕</button>
                        </div>
                        <ul id="searchDropdown" class="search-dropdown" style="display:none"></ul>
                    </div>
                </div>

                <!-- Today panel -->
                <div id="panel-today" class="day-tab-panel">
                    <div id="shootsListToday" class="shoots-container">
                        <p>Loading shoots...</p>
                    </div>
                </div>

                <!-- Tomorrow panel -->
                <div id="panel-tomorrow" class="day-tab-panel" style="display:none">
                    <div id="shootsListTomorrow" class="shoots-container">
                        <p>Loading shoots...</p>
                    </div>
                </div>

                <!-- Day After panel -->
                <div id="panel-dayafter" class="day-tab-panel" style="display:none">
                    <div id="shootsListDayafter" class="shoots-container">
                        <p>Loading shoots...</p>
                    </div>
                </div>

            </section>
        </main>
    </div>

    <script type="module" src="/js/auth.js"></script>
    <script type="module" src="/js/nav.js"></script>
    <script type="module" src="/js/live.js"></script>
    <script type="module" src="/js/version.js"></script>
</body>
</html>

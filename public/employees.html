<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees - CreativeFuel</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="container">
        <!-- Header: top row = logo + logout, bottom row = page tabs -->
        <header class="header">
            <div class="header-top-row">
                <a href="/employees.html" class="header-logo-link">
                    <img src="/images/screenshot-removebg.png" alt="CreativeFuel" class="header-logo">
                </a>
                <span id="userNameDisplay" class="header-username"></span>
                <button id="logoutBtn" class="btn btn-small btn-secondary">Logout</button>
            </div>
            <nav class="tabs-container">
                <div class="tabs">
                    <!-- Tabs will be dynamically rendered by nav.js -->
                </div>
            </nav>
        </header>

        <!-- Main content -->
        <main class="main-content">
            <!-- Employees Section -->
            <section class="section">
                <div class="employees-header">
                    <h2>Employees</h2>
                    
                    <!-- Date Filter Buttons -->
                    <div class="date-filter-buttons">
                        <button id="yesterdayBtn" class="btn btn-secondary date-filter-btn" data-date="yesterday">Yesterday</button>
                        <button id="todayBtn" class="btn btn-primary date-filter-btn active" data-date="today">Today</button>
                        <button id="tomorrowBtn" class="btn btn-secondary date-filter-btn" data-date="tomorrow">Tomorrow</button>
                    </div>
                </div>

                <div id="employeesLoading" class="loading-spinner hidden"></div>
                <div id="employeesError" class="error-message"></div>
                <div id="employeesContainer" class="employees-container">
                    <p class="placeholder-text">Loading employee data...</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Employee Details Popup Modal -->
    <div id="employeePopupModal" class="popup-modal hidden">
        <div class="popup-overlay"></div>
        <div class="popup-container">
            <div class="popup-header">
                <h3 id="popupEmployeeName">Employee Name</h3>
                <button class="popup-close-btn">&times;</button>
            </div>

            <!-- Shoot Count Summary -->
            <div id="popupShootSummary" class="popup-shoot-summary"></div>

            <!-- Employee Details Cards -->
            <div id="popupDetailsContainer" class="popup-details-container"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="/js/auth.js"></script>
    <script type="module" src="/js/nav.js"></script>
    <script type="module" src="/js/employees.js"></script>
    <script type="module" src="/js/version.js"></script>
</body>
</html>

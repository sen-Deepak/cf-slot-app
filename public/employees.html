<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees - CreativeFuel</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="container">
        <!-- Header: top row = logo + logout, bottom row = page tabs -->
        <header class="header">
            <div class="header-top-row">
                <a href="/employees.html" class="header-logo-link">
                    <img src="/images/screenshot-removebg.png" alt="CreativeFuel" class="header-logo">
                </a>
                <span id="userNameDisplay" class="header-username"></span>
                <button id="logoutBtn" class="btn btn-small btn-secondary">Logout</button>
            </div>
            <nav class="tabs-container">
                <div class="tabs">
                    <!-- Tabs will be dynamically rendered by nav.js -->
                </div>
            </nav>
        </header>

        <!-- Main content -->
        <main class="main-content">
            <section class="section">
                <h2>Employees</h2>
                <div id="employeesList" class="employees-container">
                    <p>Loading employees...</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script type="module" src="/js/auth.js"></script>
    <script type="module" src="/js/nav.js"></script>
    <script type="module" src="/js/employees.js"></script>
</body>
</html>
